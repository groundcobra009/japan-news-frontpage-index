name: Daily News Collection

on:
  schedule:
    - cron: "0 21 * * *" # UTC 21:00(前日) = JST 6:00
    - cron: "0 3 * * *" # UTC 3:00 = JST 12:00
    - cron: "0 10 * * *" # UTC 10:00 = JST 19:00
  workflow_dispatch: {}

permissions:
  contents: write
  issues: write

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run collector
        env:
          MAIL_TO: ${{ secrets.MAIL_TO }}
          MAIL_FROM: ${{ secrets.MAIL_FROM }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python -m src.main

      - name: Commit and push updated data/README
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ README.md
          git diff --cached --quiet || git commit -m "chore: update news data $(date -u +%Y-%m-%d)"
          git push
